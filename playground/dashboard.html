<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Code Execution Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #1c2128;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --accent-green-dim: #238636;
            --accent-blue: #58a6ff;
            --accent-orange: #d29922;
            --accent-red: #f85149;
            --glass-bg: rgba(22, 27, 34, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-left: 20px;
            transition: color 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
            flex: 1;
        }

        .page-header {
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .refresh-btn {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            border-color: var(--text-secondary);
            background: var(--border);
        }

        .table-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: rgba(255,255,255,0.02);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        .job-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .lang-badge {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 500;
            text-transform: capitalize;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .status-queued { background: rgba(139,148,158,0.15); color: var(--text-secondary); }
        .status-running { background: rgba(88,166,255,0.15); color: var(--accent-blue); }
        .status-completed { background: rgba(63,185,80,0.15); color: var(--accent-green); }
        .status-failed { background: rgba(248,81,73,0.15); color: var(--accent-red); }

        .time {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .mono-stat {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        
        .loading-state {
            padding: 60px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .empty-state {
            padding: 60px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            display: none;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 48px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.2s;
        }
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title { font-weight: 600; font-size: 16px; }
        .modal-close {
            background: none; border: none; color: var(--text-secondary);
            cursor: pointer; font-size: 24px;
        }
        .modal-close:hover { color: var(--text-primary); }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }
        pre {
            background: var(--bg-primary);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            overflow-x: auto;
            color: var(--accent-green);
        }
        pre.error { color: var(--accent-red); margin-top: 16px; }
        .detail-row {
            display: flex; margin-bottom: 16px; gap: 24px;
        }
        .detail-item { flex: 1; }
        .detail-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-value { font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">⚡ CEE DASHBOARD</a>
        <div class="nav-links">
            <a href="index.html">Playground</a>
            <a href="#" class="active">Dashboard</a>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <h1>Recent Executions</h1>
            <button class="refresh-btn" onclick="fetchJobs()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
                Refresh
            </button>
        </div>

        <div class="table-container">
            <table id="jobsTable">
                <thead>
                    <tr>
                        <th>Job ID</th>
                        <th>Language</th>
                        <th>Status</th>
                        <th>Time</th>
                        <th>Memory</th>
                        <th>Created At</th>
                    </tr>
                </thead>
                <tbody id="jobsBody">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
            <div id="loadingState" class="loading-state">Loading jobs...</div>
            <div id="emptyState" class="empty-state">No jobs found in the database.</div>
        </div>
    </div>

    <!-- Job Detail Modal -->
    <div class="modal-overlay" id="jobModal" onclick="if(event.target===this) closeModal()">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Job Details</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Details injected here -->
            </div>
        </div>
    </div>

    <script>
        let allJobs = [];

        function formatTime(dateStr) {
            if (!dateStr) return "—";
            const d = new Date(dateStr);
            return d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'}) + " " + d.toLocaleDateString();
        }

        function viewJob(id) {
            const job = allJobs.find(j => j.id === id);
            if (!job) return;

            document.getElementById('modalTitle').textContent = `Job: ${id}`;
            const body = document.getElementById('modalBody');
            
            let timeMs = "—", memMB = "—", exitCode = "—", stdout = "", stderr = "";
            
            if (job.result) {
                timeMs = (job.result.time_used / 1000000).toFixed(1) + " ms";
                memMB = (job.result.memory_used_bytes / (1024*1024)).toFixed(1) + " MB";
                exitCode = job.result.exit_code;
                stdout = job.result.stdout || "";
                stderr = job.result.stderr || "";
                if(job.result.timeout) exitCode = "TIMEOUT";
                if(job.result.oom) exitCode = "OOM";
            }

            body.innerHTML = `
                <div class="detail-row">
                    <div class="detail-item">
                        <div class="detail-label">Status</div>
                        <div class="detail-value"><span class="status-badge status-${job.status}">${job.status}</span></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Language</div>
                        <div class="detail-value"><span class="lang-badge">${job.language}</span></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Exit Code</div>
                        <div class="detail-value mono-stat">${exitCode}</div>
                    </div>
                </div>
                <div class="detail-row">
                    <div class="detail-item">
                        <div class="detail-label">Execution Time</div>
                        <div class="detail-value mono-stat">${timeMs}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Peak Memory</div>
                        <div class="detail-value mono-stat">${memMB}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Created At</div>
                        <div class="detail-value time">${formatTime(job.created_at)}</div>
                    </div>
                </div>
                <div class="detail-label" style="margin-top: 24px">Standard Output</div>
                <pre>${stdout || "No standard output"}</pre>
                ${stderr ? `<div class="detail-label" style="margin-top: 16px">Standard Error</div><pre class="error">${stderr}</pre>` : ''}
                ${job.error ? `<div class="detail-label" style="margin-top: 16px">System Error</div><pre class="error">${job.error}</pre>` : ''}
            `;

            document.getElementById('jobModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('jobModal').classList.remove('active');
        }

        async function fetchJobs() {
            const tbody = document.getElementById('jobsBody');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');
            
            tbody.innerHTML = '';
            loading.style.display = 'block';
            empty.style.display = 'none';

            try {
                const res = await fetch('/dashboard/jobs?limit=50');
                if (!res.ok) throw new Error("Failed to fetch jobs");
                
                const jobs = await res.json();
                allJobs = jobs || [];
                
                loading.style.display = 'none';
                
                if (allJobs.length === 0) {
                    empty.style.display = 'block';
                    return;
                }

                allJobs.forEach(job => {
                    let timeMs = "—";
                    let memMB = "—";
                    
                    if (job.result) {
                        timeMs = (job.result.time_used / 1000000).toFixed(1) + " ms";
                        memMB = (job.result.memory_used_bytes / (1024*1024)).toFixed(1) + " MB";
                    }

                    const tr = document.createElement('tr');
                    tr.style.cursor = 'pointer';
                    tr.onclick = () => viewJob(job.id);
                    tr.innerHTML = `
                        <td class="job-id">${job.id.substring(0,8)}...</td>
                        <td><span class="lang-badge">${job.language}</span></td>
                        <td><span class="status-badge status-${job.status}">${job.status}</span></td>
                        <td class="mono-stat">${timeMs}</td>
                        <td class="mono-stat">${memMB}</td>
                        <td class="time">${formatTime(job.created_at)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                loading.style.display = 'none';
                empty.style.display = 'block';
                empty.textContent = "Error loading jobs: " + e.message;
            }
        }

        // Initial load
        fetchJobs();
    </script>
</body>
</html>
