services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_MODE=api
      - PORT=8080
      - REDIS_URL=redis://redis:6379
      - MAX_WORKERS=10
      - RATE_LIMIT_RPM=120
      - CORS_ALLOWED_ORIGINS=*
      - PLAYGROUND_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - APP_MODE=worker
      - REDIS_URL=redis://redis:6379
      - MAX_WORKERS=5
      - DOCKER_TIMEOUT_MS=5000
      - DOCKER_MEMORY_LIMIT=128m
      - PRE_PULL_LANGUAGES=python,golang,cpp,c,javascript,typescript,java,rust,ruby,php
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
